<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業管理版估價系統</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* 列印設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            .print-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }

        /* 隱藏原生數字箭頭 */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        
        /* 手機端輸入框優化：防止 iOS 自動放大 */
        @media (max-width: 768px) {
            input, textarea, select { font-size: 16px !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-4 md:py-6 px-3 md:px-4 text-slate-900">

    <div id="app" class="max-w-5xl mx-auto space-y-4 md:space-y-6">
        <nav class="bg-white px-4 md:px-6 py-1 rounded-2xl shadow-sm border border-slate-200 flex gap-6 md:gap-8 no-print overflow-x-auto">
            <button onclick="switchView('estimate')" id="tab-estimate" class="py-3 font-bold transition tab-active flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="file-text" class="w-5 h-5"></i> 製作報價單
            </button>
            <button onclick="switchView('manage')" id="tab-manage" class="py-3 font-bold text-slate-400 hover:text-indigo-600 transition flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="database" class="w-5 h-5"></i> 管理品項庫
            </button>
        </nav>

        <div id="view-estimate" class="space-y-4 md:space-y-6">
            <header class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center no-print">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white">
                        <i data-lucide="calculator" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-lg md:text-xl font-black tracking-tight">報價單編輯器</h1>
                </div>
                <button onclick="window.print()" class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 transition flex items-center gap-2 font-bold text-sm">
                    <i data-lucide="printer" class="w-4 h-4"></i> <span class="hidden md:inline">列印 / PDF</span>
                </button>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 no-print">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                    <i data-lucide="user" class="text-slate-400 w-5 h-5"></i>
                    <input id="clientName" oninput="saveCurrentData()" placeholder="客戶或案場名稱..." class="w-full outline-none font-bold bg-transparent">
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                    <span class="text-sm font-bold text-slate-400">稅率 (%)</span>
                    <input id="taxRate" type="number" value="5" oninput="updateTotals()" class="w-full outline-none font-bold bg-transparent text-right">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-card">
                <div class="hidden md:grid md:grid-cols-12 bg-slate-50 border-b border-slate-100 text-slate-500 text-sm font-bold py-4 px-6">
                    <div class="col-span-4">品項名稱</div>
                    <div class="col-span-2 text-center">單位</div>
                    <div class="col-span-2 text-right">單價</div>
                    <div class="col-span-2 text-center">數量</div>
                    <div class="col-span-2 text-right">小計</div>
                </div>

                <div id="estimateItems" class="divide-y divide-slate-100">
                    </div>

                <div class="p-4 bg-slate-50/50 no-print border-t border-slate-100">
                    <button onclick="addEstimateItem()" class="w-full py-4 bg-white border border-dashed border-indigo-200 rounded-xl text-indigo-600 font-bold flex items-center justify-center gap-2 hover:bg-indigo-50 active:scale-95 transition-all">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> 新增品項
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 items-start">
                <div class="space-y-2 no-print order-2 md:order-1">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">備註事項</label>
                    <textarea id="note" oninput="saveCurrentData()" rows="4" placeholder="輸入備註或付款說明..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm"></textarea>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl space-y-4 order-1 md:order-2">
                    <div class="flex justify-between items-center opacity-60 text-sm"><span>合計金額</span><span id="subtotalDisplay">$0</span></div>
                    <div class="flex justify-between items-center opacity-60 text-sm"><span>稅額</span><span id="taxDisplay">$0</span></div>
                    <div class="h-px bg-white/10 my-2"></div>
                    <div class="flex justify-between items-end"><span class="text-sm font-bold text-slate-400">應付總額</span><span id="grandTotalDisplay" class="text-3xl font-black text-indigo-400">$0</span></div>
                </div>
            </div>
        </div>

        <div id="view-manage" class="hidden space-y-6">
            <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800">常用品項庫管理</h2>
                <p class="text-sm text-slate-400 mt-1">設定好單價，報價時輸入名稱會自動帶入。</p>
            </header>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                    <input id="libName" placeholder="品項名稱" class="p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <input id="libUnit" placeholder="單位" class="p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <input id="libPrice" type="number" placeholder="單價" class="p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="addLibraryItem()" class="bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition">新增至庫存</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div id="libraryItems" class="divide-y divide-slate-100">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 資料初始化
        let library = JSON.parse(localStorage.getItem('lib_data')) || [
            { id: 1, name: '水泥粉刷', unit: '坪', price: 2500 },
            { id: 2, name: '矽利康施工', unit: '支', price: 150 }
        ];

        let currentEstimate = JSON.parse(localStorage.getItem('est_current')) || {
            clientName: '',
            taxRate: 5,
            note: '',
            items: [{ id: Date.now(), name: '', unit: '', price: 0, quantity: 1 }]
        };

        function init() {
            lucide.createIcons();
            renderLibrary();
            renderEstimate();
            // 載入暫存資料
            document.getElementById('clientName').value = currentEstimate.clientName || '';
            document.getElementById('taxRate').value = currentEstimate.taxRate || 5;
            document.getElementById('note').value = currentEstimate.note || '';
        }

        function switchView(view) {
            document.getElementById('view-estimate').classList.toggle('hidden', view !== 'estimate');
            document.getElementById('view-manage').classList.toggle('hidden', view !== 'manage');
            document.getElementById('tab-estimate').className = `py-3 font-bold transition flex items-center gap-2 ${view === 'estimate' ? 'tab-active' : 'text-slate-400 hover:text-indigo-600'}`;
            document.getElementById('tab-manage').className = `py-3 font-bold transition flex items-center gap-2 ${view === 'manage' ? 'tab-active' : 'text-slate-400 hover:text-indigo-600'}`;
        }

        // 渲染品項庫
        function renderLibrary() {
            const container = document.getElementById('libraryItems');
            container.innerHTML = library.length ? '' : '<div class="p-8 text-center text-slate-400 font-medium">庫存目前是空的</div>';
            library.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-4 hover:bg-slate-50 transition';
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="font-bold text-slate-800">${item.name}</div>
                        <div class="text-xs text-slate-400">${item.unit} / $${item.price.toLocaleString()}</div>
                    </div>
                    <button onclick="removeLibItem(${item.id})" class="p-2 text-slate-300 hover:text-red-500 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
            localStorage.setItem('lib_data', JSON.stringify(library));
        }

        function addLibraryItem() {
            const name = document.getElementById('libName').value.trim();
            const unit = document.getElementById('libUnit').value.trim();
            const price = Number(document.getElementById('libPrice').value);
            if (!name) return alert('請輸入品項名稱');
            library.push({ id: Date.now(), name, unit, price });
            document.getElementById('libName').value = '';
            document.getElementById('libUnit').value = '';
            document.getElementById('libPrice').value = '';
            renderLibrary();
            renderEstimate(); // 同步更新下拉選單
        }

        function removeLibItem(id) {
            if (confirm('確定刪除此標準品項？')) {
                library = library.filter(i => i.id !== id);
                renderLibrary();
                renderEstimate();
            }
        }

        // 渲染報價單內容 (行動優化版)
        function renderEstimate() {
            const container = document.getElementById('estimateItems');
            container.innerHTML = '';
            currentEstimate.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'p-4 md:p-0 md:grid md:grid-cols-12 md:items-center hover:bg-slate-50/30 transition group relative';
                div.innerHTML = `
                    <div class="col-span-4 md:py-4 md:px-6 mb-3 md:mb-0">
                        <div class="flex items-center gap-2">
                            <input type="text" list="lib-options" value="${item.name}" 
                                oninput="updateEstimateItem(${item.id}, 'name', this.value)" 
                                class="w-full bg-slate-100 md:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none outline-none border-b border-transparent focus:border-indigo-400 font-bold text-slate-800" 
                                placeholder="品項名稱...">
                            <button onclick="removeEstimateItem(${item.id})" class="no-print md:hidden p-2 text-red-400 active:bg-red-50 rounded-lg">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <datalist id="lib-options">
                            ${library.map(l => `<option value="${l.name}">${l.unit} / $${l.price}</option>`).join('')}
                        </datalist>
                    </div>

                    <div class="col-span-2 flex items-center md:justify-center mb-2 md:mb-0">
                        <span class="md:hidden text-xs font-bold text-slate-400 w-12">單位</span>
                        <input type="text" value="${item.unit}" oninput="updateEstimateItem(${item.id}, 'unit', this.value)" class="w-full bg-transparent outline-none text-left md:text-center text-slate-500">
                    </div>
                    <div class="col-span-2 flex items-center justify-end mb-4 md:mb-0">
                        <span class="md:hidden text-xs font-bold text-slate-400 w-12 text-left">單價</span>
                        <input type="number" value="${item.price}" oninput="updateEstimateItem(${item.id}, 'price', this.value)" class="w-full bg-transparent outline-none text-right font-mono font-bold text-indigo-600">
                    </div>

                    <div class="col-span-2 py-2 flex items-center justify-center bg-slate-50 md:bg-transparent rounded-2xl md:rounded-none px-4">
                        <button onclick="changeQty(${item.id}, -1)" class="no-print p-2 hover:bg-indigo-100 rounded-full text-indigo-600">
                            <i data-lucide="minus-circle" class="w-6 h-6 md:w-5 md:h-5"></i>
                        </button>
                        <input type="number" value="${item.quantity}" 
                            oninput="updateEstimateItem(${item.id}, 'quantity', this.value)" 
                            class="w-16 bg-transparent border-none text-center font-mono font-black text-xl md:text-base outline-none">
                        <button onclick="changeQty(${item.id}, 1)" class="no-print p-2 hover:bg-indigo-100 rounded-full text-indigo-600">
                            <i data-lucide="plus-circle" class="w-6 h-6 md:w-5 md:h-5"></i>
                        </button>
                    </div>

                    <div class="col-span-2 py-3 flex items-center justify-end md:px-6">
                        <span class="md:hidden text-xs font-bold text-slate-400 mr-auto">小計</span>
                        <span class="font-black text-xl md:text-base text-slate-800">$${(item.price * item.quantity).toLocaleString()}</span>
                        <button onclick="removeEstimateItem(${item.id})" class="hidden md:block ml-4 text-slate-200 hover:text-red-500 transition no-print">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
            updateTotals();
        }

        function changeQty(id, delta) {
            const item = currentEstimate.items.find(i => i.id === id);
            if (item) {
                const newQty = Math.max(0, (item.quantity || 0) + delta);
                updateEstimateItem(id, 'quantity', newQty);
                renderEstimate();
            }
        }

        function addEstimateItem() {
            currentEstimate.items.push({ id: Date.now(), name: '', unit: '', price: 0, quantity: 1 });
            renderEstimate();
            saveCurrentData();
        }

        function removeEstimateItem(id) {
            if (currentEstimate.items.length > 1) {
                currentEstimate.items = currentEstimate.items.filter(i => i.id !== id);
                renderEstimate();
                saveCurrentData();
            }
        }

        function updateEstimateItem(id, field, value) {
            const item = currentEstimate.items.find(i => i.id === id);
            if (item) {
                item[field] = (field === 'price' || field === 'quantity') ? Number(value) : value;
                if (field === 'name') {
                    const match = library.find(l => l.name === value);
                    if (match) {
                        item.price = match.price;
                        item.unit = match.unit;
                        renderEstimate();
                    }
                }
                updateTotals();
                saveCurrentData();
            }
        }

        function updateTotals() {
            const sub = currentEstimate.items.reduce((s, i) => s + (i.price * i.quantity), 0);
            const rate = Number(document.getElementById('taxRate').value) || 0;
            const tax = Math.round(sub * (rate / 100));
            document.getElementById('subtotalDisplay').innerText = `$${sub.toLocaleString()}`;
            document.getElementById('taxDisplay').innerText = `$${tax.toLocaleString()}`;
            document.getElementById('grandTotalDisplay').innerText = `$${(sub + tax).toLocaleString()}`;
        }

        function saveCurrentData() {
            currentEstimate.clientName = document.getElementById('clientName').value;
            currentEstimate.taxRate = Number(document.getElementById('taxRate').value);
            currentEstimate.note = document.getElementById('note').value;
            localStorage.setItem('est_current', JSON.stringify(currentEstimate));
        }

        init();
    </script>
</body>
</html>
